<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memo Game Map</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --green-btn: #82c91e;
            --locked-color: #d1d5db;
            --unlocked-bg: #ffffff;
            --completed-bg: #e8f5e9;
            --modal-bg: #fff5e6;
            --modal-border: #f39c12;
            --panel-bg: rgba(255, 255, 255, 0.6);
            --gold: #ffd700;
            --gold-dark: #ccac00;
            --store-bg: #fffbf0;
        }

        body {
            background-image: url('assets/images/3d-cartoon-apple.jpg');
            background-size: 110% 110%; /* Slightly larger for panning */
            background-position: center;
            background-attachment: fixed;
            font-family: 'Arial Rounded MT Bold', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            animation: panBackground 20s infinite alternate ease-in-out;
        }

        @keyframes panBackground {
            from { background-position: 0% 0%; }
            to { background-position: 100% 100%; }
        }

        .game-container {
            width: 85%;
            max-width: 750px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            padding: 40px 20px;
            border-radius: 50px;
            position: relative;
            text-align: center;
            border: 4px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: containerEntrance 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes containerEntrance {
            from { opacity: 0; transform: scale(0.8) translateY(50px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .character-box {
            position: absolute;
            top: -60px;
            left: -30px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 100;
        }

        .character {
            width: 150px;
            height: auto;
            content: url('assets/images/green.png');
            animation: characterPlayful 3s infinite ease-in-out;
            transform-origin: bottom center;
        }

        @keyframes characterPlayful {
            0%, 100% { 
                transform: translateY(0) scale(1) rotate(0deg); 
            }
            25% { 
                transform: translateY(-10px) scale(0.98, 1.05) rotate(2deg); 
            }
            50% { 
                transform: translateY(0) scale(1.05, 0.95) rotate(0deg); 
            }
            75% { 
                transform: translateY(-15px) scale(0.95, 1.1) rotate(-3deg); 
            }
        }
    .speech-bubble {
        white-space: nowrap;
        position: relative;
        font-size: 1.1rem; /* Slightly smaller */
        letter-spacing: 1px;
        text-transform: uppercase;
        padding: 8px 20px; /* More compact */
        border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
        border: 3px solid #82c91e;
        background: white;
        display: flex;
        justify-content: center;
        align-items: center;
        animation: popAndWiggle 3s infinite ease-in-out;
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        
        /* Simpler 3D Text Effect for smaller size */
        font-family: 'Arial Rounded MT Bold', sans-serif;
        color: #ff4757;
        font-weight: 900;
        text-shadow: 
            1px 1px 0px #fff,
            2px 2px 0px #d63031,
            3px 3px 6px rgba(0,0,0,0.2);
    }

/* .speech-bubble::after removed as per user request */

@keyframes popAndWiggle {
    0%, 100% {
        transform: translateY(0) scale(1) rotate(0deg);
    }
    33% {
        transform: translateY(-3px) scale(1.04) rotate(1deg);
    }
    66% {
        transform: translateY(-1px) scale(0.97) rotate(-0.5deg);
    }
}

.magic-particle {
    position: fixed;
    bottom: -10px; 
    width: 8px;
    height: 8px;
    background: radial-gradient(circle, #fff, #ffeb3b);
    border-radius: 50%;
    pointer-events: none; 
    z-index: 1;
    box-shadow: 0 0 10px #ffeb3b, 0 0 20px #ff9800; 
    animation: flyUp linear forwards;
    filter: blur(1px);
}

@keyframes flyUp {
    0% {
        transform: translateY(0) translateX(0) scale(1) rotate(0deg);
        opacity: 0;
    }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% {
        transform: translateY(-110vh) translateX(50px) scale(0.5) rotate(360deg);
        opacity: 0;
    }
}
        /* البار العلوي */
        .top-stats {
            display: flex;
            justify-content: flex-end; /* Moved back to original position */
            gap: 20px;
            margin-bottom: 30px;
            animation: fadeInRight 1s 0.8s both;
        }

        @keyframes fadeInRight {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 12px 30px;
            border-radius: 40px;
            color: white;
            border: 2px solid rgba(255,255,255,0.4);
            font-weight: 900;
            font-size: 1.8rem;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 15px;
            transition: 0.3s;
        }

        .stat-item:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.3);
        }

        .stat-item i {
            color: #ffd700;
            font-size: 2.2rem;
            filter: drop-shadow(0 0 8px rgba(255, 215, 0, 0.8));
            animation: twinkle 2s infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.8; }
        }

        
        .levels-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin: 20px 0;
            transition: transform 0.3s ease;
        }

        .level-card {
            background: var(--unlocked-bg);
            border-radius: 20px; /* Slightly rounder */
            aspect-ratio: 1/1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 8px 0 #e5d1b8, 0 10px 20px rgba(0,0,0,0.1);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-weight: 900;
            color: #333;
            font-size: 1.8rem; /* Larger numbers */
            position: relative;
            transform: scale(0); 
            animation: cardPopIn 0.5s forwards;
            transform-style: preserve-3d;
            will-change: transform;
            overflow: hidden;
        }

        /* Premium Number Styling */
        .level-number {
            font-family: 'Arial Rounded MT Bold', sans-serif;
            background: linear-gradient(135deg, #ff4757, #ff6b81);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(2px 2px 0px white);
            position: relative;
            display: inline-block;
            animation: floatNumber 3s infinite ease-in-out;
            z-index: 2;
        }

        .level-card.locked .level-number {
            background: #999;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: none;
            opacity: 0.5;
        }

        .level-card.completed .level-number {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @keyframes floatNumber {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-5px) rotate(2deg); }
        }

        .level-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 15px;
            background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(255,255,255,0.4) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .level-card:hover::before { opacity: 1; }

        @keyframes cardPopIn {
            to { transform: scale(1); }
        }

        .level-card:hover:not(.locked) { 
            transform: scale(1.15) translateY(-5px); 
            z-index: 10; 
            box-shadow: 0 15px 30px rgba(0,0,0,0.2), 0 5px 0 #d4c0a7;
            background: #fff9f0;
        }

        .level-card.active {
            animation: activePulse 2s infinite;
            border: 4px solid #f1c40f !important;
            box-shadow: 0 0 15px #f1c40f, 0 5px 0 #d35400;
        }

        @keyframes activePulse {
            0% { box-shadow: 0 0 0 0 rgba(241, 196, 15, 0.7); transform: scale(1); }
            50% { box-shadow: 0 0 0 15px rgba(241, 196, 15, 0); transform: scale(1.05); }
            100% { box-shadow: 0 0 0 0 rgba(241, 196, 15, 0); transform: scale(1); }
        }

       
        .level-card.locked {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            cursor: not-allowed;
            color: #fff;
            filter: grayscale(80%);
            opacity: 0.7;
        }
        
        .lock-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 80px;
            height: 80px;
        }
        
        .lock-bg {
            color: rgba(0, 0, 0, 0.2);
            font-size: 4.2rem;
            filter: drop-shadow(0 4px 5px rgba(0,0,0,0.3));
        }

        .lock-ring {
            position: absolute;
            color: var(--gold);
            font-size: 3.2rem;
            opacity: 0.6;
            animation: rotateRing 10s infinite linear;
        }

        @keyframes rotateRing {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .level-card.locked .lock-icon {
            position: absolute;
            color: #fff;
            font-size: 1.8rem;
            filter: drop-shadow(0 0 8px rgba(0,0,0,0.5));
            animation: lockGlow 2s infinite alternate ease-in-out;
            z-index: 2;
        }

        @keyframes lockGlow {
            0% { transform: scale(1) rotate(-5deg); filter: drop-shadow(0 0 2px #fff); }
            100% { transform: scale(1.1) rotate(5deg); filter: drop-shadow(0 0 15px #f1c40f); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px) rotate(-1deg); }
            75% { transform: translateX(8px) rotate(1deg); }
        }

        .level-card.completed {
            background: var(--completed-bg);
            box-shadow: 0 5px 0 #4caf50;
        }

        /* Star indicators on map */
        .stars-on-card {
            display: flex;
            gap: 2px;
            margin-top: 5px;
        }
        .stars-on-card i {
            font-size: 0.8rem;
            color: #ccc; /* Unfilled */
        }
        .stars-on-card i.filled {
            color: #f1c40f;
            text-shadow: 0 0 5px rgba(241, 196, 15, 0.5);
            animation: starBounce 0.5s ease;
        }
        @keyframes starBounce {
            0% { transform: scale(0); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        .arrow {
            position: absolute;
            top: 55%;
            width: 45px;
            height: 45px;
            background: #f39c12;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 0 #d35400;
            z-index: 10;
        }
        .arrow-left { left: -22px; }
        .arrow-right { right: -22px; }

        .play-btn {
            background: var(--green-btn);
            color: white;
            border: none;
            padding: 10px 60px;
            font-size: 1.8rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 0 #5b8c15;
            font-weight: bold;
            margin-top: 20px;
            transition: 0.2s;
            animation: playPulse 2s infinite;
        }
        @keyframes playPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .play-btn:active { 
            transform: translateY(3px) scale(0.95); 
            box-shadow: 0 3px 0 #5b8c15; 
            animation: none;
        }

        .back-link {
            position: absolute;
            bottom: -25px;
            left: 20px;
            background: #ff85a1;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 3px solid white;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
    

/* تعديل الـ Grid عشان الـ 20 ليفل */
.levels-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr); 
    grid-template-rows: repeat(2, 1fr);    
    gap: 15px; /* Increased gap for tilt space */
    width: 100%;
    transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    perspective: 1000px;
}

.cursor-trail {
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    font-size: 10px;
    animation: fadeScale 0.8s forwards ease-out;
}

@keyframes fadeScale {
    0% { transform: scale(1) rotate(0deg); opacity: 1; }
    100% { transform: scale(0) rotate(180deg); opacity: 0; }
}

/* حاوية السلايدر */
.grid-wrapper {
    overflow: hidden;
    width: 100%;
}

.pages-slider {
    display: flex;
    width: 200%;
    transition: transform 0.5s ease-in-out;
}

.grid-page {
    width: 50%;
    flex-shrink: 0;
    position: relative;
}

/* صفحة الـ SOON */
.soon-banner {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 10;
    pointer-events: none;
    text-align: center;
    background: rgba(0, 0, 0, 0.4);
    padding: 20px 50px;
    border-radius: 30px;
    backdrop-filter: blur(8px);
}

.soon-banner-text {
    font-family: 'Arial Rounded MT Bold', sans-serif;
    font-size: 4rem;
    font-weight: 900;
    letter-spacing: 12px;
    color: #f1c40f;
    text-shadow: 0 0 20px rgba(241,196,15,0.9), 4px 4px 0 rgba(0,0,0,0.6);
    white-space: nowrap;
}

.soon-banner-sub {
    font-size: 1.2rem;
    color: #fff;
    font-weight: bold;
    letter-spacing: 2px;
    margin-top: 5px;
    text-shadow: 0 0 5px rgba(0,0,0,0.8);
}
 /* الألوان الأساسية عشان نسهل التعديل */
:root {
    --modal-bg: #fff5e6;      /* لون الخلفية بيج فاتح */
    --modal-border: #f39c12;  /* لون البرواز برتقالي */
    --header-bg: #ff6b81;     /* لون عنوان SETTINGS */
    --ok-btn-bg: #2ecc71;     /* لون زرار OK أخضر */
}

/* الخلفية اللي بتغطي الشاشة كلها لما المودال يفتح */
.modal {
    display: none; /* مخفي في البداية */
    position: fixed;
    z-index: 2000;
    left: 0; top: 0;
    width: 100%; height: 100%;
    background-color: rgba(0,0,0,0.7); /* سواد شفاف */
    justify-content: center;
    align-items: center;
}

/* المربع الأبيض اللي جواه الإعدادات */
.modal-content {
    background-color: var(--modal-bg);
    border: 8px solid var(--modal-border);
    border-radius: 40px;
    width: 300px;
    padding: 45px 20px 30px; /* مساحة داخلية */
    position: relative;
    box-shadow: 0 10px 0 rgba(0,0,0,0.2);
    text-align: center;
    font-family: 'Arial Rounded MT Bold', sans-serif;
}

/* كلمة SETTINGS اللي فوق */
.modal-header {
    background: var(--header-bg);
    color: white;
    padding: 10px 35px;
    border-radius: 20px;
    font-size: 1.3rem;
    position: absolute;
    top: -25px; /* عشان تطلع بره المربع شوية */
    left: 50%;
    transform: translateX(-50%);
    border: 3px solid #fff;
    box-shadow: 0 4px 0 #d63031;
    font-weight: bold;
    letter-spacing: 2px;
}

/* صفوف الإعدادات (الصوت والموسيقى) */
.setting-row {
    display: flex;
    align-items: center;
    gap: 15px;
    margin-bottom: 25px;
    padding: 0 10px;
}

.icon-orange {
    color: #e67e22;
    font-size: 1.8rem;
    text-shadow: 1px 1px 0 white;
}

/* شكل السلايدر (شريط التحكم) */
.slider {
    -webkit-appearance: none;
    width: 100%;
    height: 15px;
    background: #f1c40f;
    border-radius: 10px;
    border: 2px solid #d35400;
    outline: none;
}

/* الدائرة اللي بنحركها في السلايدر */
.slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 25px;
    height: 25px;
    background: #3498db;
    border-radius: 50%;
    border: 3px solid white;
    cursor: pointer;
    box-shadow: 0 2px 5px rgba(0,0,0,0.3);
}

/* زرار OK */
.ok-btn {
    background: var(--ok-btn-bg);
    color: white;
    border: 4px solid white;
    padding: 10px 45px;
    font-size: 1.6rem;
    border-radius: 30px;
    margin-top: 10px;
    box-shadow: 0 5px 0 #27ae60;
    cursor: pointer;
    font-weight: bold;
    transition: 0.2s;
}

.ok-btn:active {
    transform: translateY(3px); /* حركة الضغط */
    box-shadow: 0 2px 0 #27ae60;
}

/* Store Styles */
.store-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 15px;
    margin-top: 20px;
}

.store-item {
    background: white;
    padding: 15px;
    border-radius: 20px;
    border: 2px solid #f1c40f;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: 0.3s;
}

.store-item:hover {
    transform: scale(1.02);
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.item-info {
    text-align: left;
    display: flex;
    align-items: center;
    gap: 10px;
}

.item-name {
    font-weight: bold;
    color: #333;
    display: block;
}

.item-price {
    color: #f39c12;
    font-size: 0.9rem;
}

.buy-btn {
    background: #2ecc71;
    color: white;
    border: none;
    padding: 8px 15px;
    border-radius: 15px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 3px 0 #27ae60;
}

.buy-btn:active {
    transform: translateY(2px);
    box-shadow: 0 1px 0 #27ae60;
}

.buy-btn:disabled {
    background: #ccc;
    box-shadow: none;
    cursor: not-allowed;
}

.global-hints-count {
    background: #3498db;
    color: white;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 0.8rem;
    margin-left: 5px;
}

.store-btn {
    position: absolute;
    bottom: 60px;
    right: 350px;
    background: #f1c40f; 
    border: 3px solid white;
    color: white;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    font-size: 1.5rem;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 101;
    transition: 0.3s ease-in-out;
}

.store-btn:hover {
    transform: scale(1.1) rotate(10deg);
    background: #f39c12;
}

.settings-btn {
    position: absolute;
    /* التعديل هنا */
    bottom: 60px;   /* خليه يطلع لفوق شوية (لو عايزاه يطلع أكتر صغري الرقم أو خليه 0) */
    right: 410px;    /* خليه يدخل شمال شوية عشان يركب على الزاوية بالظبط */
    
    background: #ff85a1; 
    border: 3px solid white;
    color: white;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    font-size: 1.5rem;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 101;
    transition: 0.3s ease-in-out;
}

/* لو عايزاه يلف لما تلمسيه */
.settings-btn:hover {
    transform: rotate(90deg) scale(1.1);
}

    </style>
</head>
<body>
<button onclick="window.parent.postMessage('closeGame', '*')" class="home-btn-automated" style="position: fixed; top: 20px; right: 20px; width: 60px; height: 60px; background: radial-gradient(circle, #ff9a9e, #fad0c4); border: 3px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 9999; box-shadow: 0 4px 8px rgba(0,0,0,0.2); transition: transform 0.2s, background 0.3s; border:none;">
    <i class="fas fa-home" style="color: white; font-size: 25px;"></i>
</button>

  <div class="settings-wrapper">
        <button class="settings-btn" onclick="toggleSettings()"><i class="fas fa-cog"></i></button>
        <button class="store-btn" onclick="toggleStore()"><i class="fas fa-shopping-cart"></i></button>
    </div>

    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">SETTINGS</div>
            
            <div class="setting-row">
                <i class="fas fa-volume-up icon-orange"></i>
                <input type="range" class="slider" id="volumeSlider">
            </div>
            
            <div class="setting-row">
                <i class="fas fa-music icon-orange"></i>
                <input type="range" class="slider" id="musicSlider" oninput="updateMusicVolume(this.value)">
            </div>

            <div style="color: #a3613a; font-weight: bold; margin-bottom: 20px;">
                Notification <span style="background:#2ecc71; color:white; padding:2px 10px; border-radius:10px; margin-left:10px;">ON</span>
            </div>

            <button class="ok-btn" onclick="toggleSettings()">OK</button>
        </div>
    </div>

    <div id="storeModal" class="modal">
        <div class="modal-content" style="width: 350px;">
            <div class="modal-header" style="background: #f1c40f;">STORE</div>
            
            <div class="store-grid">
                <div class="store-item">
                    <div class="item-info">
                        <i class="fas fa-lightbulb" style="color: #f1c40f; font-size: 1.5rem;"></i>
                        <div>
                            <span class="item-name">Extra Hint <span class="global-hints-count" id="hint-stock">3</span></span>
                            <span class="item-price">50 Coins</span>
                        </div>
                    </div>
                    <button class="buy-btn" onclick="buyItem('hint', 50)">BUY</button>
                </div>
                
                <div class="store-item">
                    <div class="item-info">
                        <i class="fas fa-unlock-alt" style="color: #e67e22; font-size: 1.5rem;"></i>
                        <div>
                            <span class="item-name">Unlock Next Level</span>
                            <span class="item-price">150 Coins</span>
                        </div>
                    </div>
                    <button class="buy-btn" onclick="buyItem('unlock', 150)">BUY</button>
                </div>
            </div>

            <button class="ok-btn" style="background: #f39c12;" onclick="toggleStore()">CLOSE</button>
        </div>
    </div>

    <audio id="bgMusic" loop>
        <source src="assets/audio/mfcc-retro-arcade-game-music-297305.mp3" type="audio/mpeg">
    </audio>
    <div class="game-container">
        <div class="character-box">
            <div class="character"></div>
            <div class="speech-bubble">LET'S PLAY!</div>
        </div>

        <div class="top-stats">
            <div class="stat-item">
                <i class="fas fa-star" style="color: yellow;"></i> 
                <span id="total-stars-display">0</span> 
            </div>
            <div class="stat-item">
                <i class="fas fa-coins" style="color: #ffd700;"></i> 
                <span id="total-money-display">0</span> 
            </div>
        </div>

        <h1 style="color:white; text-shadow: 2px 2px 5px rgba(0,0,0,0.3); margin:0;">LEVELS</h1>

        <div class="arrow arrow-left" onclick="moveGrid('left')"><i class="fas fa-chevron-left"></i></div>
        <div class="arrow arrow-right" onclick="moveGrid('right')"><i class="fas fa-chevron-right"></i></div>

        <div class="grid-wrapper">
            <div class="pages-slider" id="pagesSlider">
                <!-- صفحة الخريطة الرئيسية -->
                <div class="grid-page">
                    <div class="levels-grid" id="levelsGrid"></div>
                </div>

                <!-- صفحة قريباً -->
                <div class="grid-page">
                    <div class="soon-banner">
                        <div class="soon-banner-text">SOON</div>
                        <div class="soon-banner-sub">🚀 More levels coming!</div>
                    </div>
                    <div class="levels-grid" id="soonGrid"></div>
                </div>
            </div>
        </div>

        <button class="play-btn" onclick="startCurrentLevel()">PLAY</button>

        <a href="start2.html" class="back-link">
            <i class="fas fa-arrow-left fa-lg"></i>
        </a>
    </div>

    <script>
        const totalLevels = 10;

        function initMap() {
            const grid = document.getElementById('levelsGrid');
            grid.innerHTML = '';

            for (let i = 1; i <= totalLevels; i++) {
                const card = document.createElement('div');
                card.className = 'level-card';
                card.id = `lvl${i}`;
                card.style.animationDelay = `${i * 0.1}s`;
                
                // ليفل 1 مفتوح دايما، الباقي يعتمد على اللي قبله
                const isFirst = (i === 1);
                const prevCompleted = localStorage.getItem(`level${i-1}Completed`) === 'true';
                const isCompleted = localStorage.getItem(`level${i}Completed`) === 'true';

                if (isFirst || prevCompleted || isCompleted) {
                    // ليفل مفتوح
                    if (isCompleted) {
                        card.classList.add('completed');
                        
                        // Get stars from localStorage
                        const levelStars = parseInt(localStorage.getItem(`level${i}Stars`)) || 0;
                        
                        let starHTML = '<div class="stars-on-card">';
                        for(let s=1; s<=3; s++) {
                            starHTML += `<i class="fas fa-star ${s <= levelStars ? 'filled' : ''}"></i>`;
                        }
                        starHTML += '</div>';

                        card.innerHTML = `<span class="level-number">${i}</span>${starHTML}`;
                    } else {
                        // ليفل نشط مش كامل
                        if (!isCompleted && (isFirst || prevCompleted)) {
                            card.classList.add('active');
                        }
                        card.innerHTML = `<span class="level-number">${i}</span>`;
                        card.style.border = "3px solid var(--green-btn)";
                    }
                    card.onclick = () => window.location.href = `puzzle${i}.html`;
                } else {
                    // ليفل مقفول
                    card.classList.add('locked');
                    card.innerHTML = `
                        <div class="lock-wrapper">
                            <i class="fas fa-circle lock-bg"></i>
                            <i class="fas fa-circle-notch lock-ring"></i>
                            <i class="fas fa-lock lock-icon"></i>
                        </div>
                    `;
                    card.onclick = () => {
                        card.style.animation = 'shake 0.4s cubic-bezier(.36,.07,.19,.97) both';
                        setTimeout(() => card.style.animation = '', 400);
                        
                        // Simple custom toast or alert
                        const toast = document.createElement('div');
                        toast.style = "position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.8); color:white; padding:10px 20px; border-radius:30px; z-index:9999; animation: fadeInUp 0.5s;";
                        toast.innerHTML = "<i class='fas fa-lock'></i> Complete previous levels!";
                        document.body.appendChild(toast);
                        setTimeout(() => {
                            toast.style.animation = "fadeOutDown 0.5s";
                            setTimeout(() => toast.remove(), 500);
                        }, 2000);
                    };
                }
                
                grid.appendChild(card);
            }
        }

        function startCurrentLevel() {
            // بيدور على أول ليفل مش خلصان ويفتحه
            for (let i = 1; i <= totalLevels; i++) {
                if (localStorage.getItem(`level${i}Completed`) !== 'true') {
                    window.location.href = `puzzle${i}.html`;
                    return;
                }
            }
            window.location.href = `puzzle1.html`;
        }

        function initSoonGrid() {
            const soonGrid = document.getElementById('soonGrid');
            soonGrid.innerHTML = '';
            for (let i = 1; i <= 10; i++) {
                const card = document.createElement('div');
                card.className = 'level-card locked';
                card.style.opacity = '0.8'; /* شفافة شوية لتوضيح إنها قيد الانتظار */
                card.style.pointerEvents = 'none';
                card.innerHTML = `
                    <div class="lock-wrapper">
                        <i class="fas fa-circle lock-bg"></i>
                        <i class="fas fa-circle-notch lock-ring"></i>
                        <i class="fas fa-lock lock-icon"></i>
                    </div>
                `;
                soonGrid.appendChild(card);
            }
        }

        let currentPage = 0;

        function moveGrid(direction) {
            const slider = document.getElementById('pagesSlider');
            if (direction === 'right' && currentPage === 0) {
                currentPage = 1;
            } else if (direction === 'left' && currentPage === 1) {
                currentPage = 0;
            }
            slider.style.transform = `translateX(-${currentPage * 50}%)`;
        }

        function createMagicParticles() {
    // بنعمل دايرة جديدة كل فترة قصيرة
    setInterval(() => {
        const particle = document.createElement('div');
        particle.className = 'magic-particle';
        
        // مكان عشوائي بالعرض (من اليمين للشمال)
        const randomX = Math.random() * window.innerWidth;
        particle.style.left = randomX + 'px';
        
        // حجم عشوائي بسيط عشان يبان فيه تنوع
        const size = Math.random() * 8 + 4 + 'px';
        particle.style.width = size;
        particle.style.height = size;
        
        // سرعة عشوائية (تطير في وقت ما بين 3 لـ 7 ثواني)
        const duration = Math.random() * 4 + 3;
        particle.style.animationDuration = duration + 's';
        
        document.body.appendChild(particle);
        
        // نمسحها من الكود أول ما تخلص عشان م تتقلش الصفحة
        setTimeout(() => {
            particle.remove();
        }, duration * 1000);
        
    }, 300); // كل 300 مللي ثانية تطلع واحدة جديدة
}

// شغليها مع فتح الصفحة
window.addEventListener('load', () => {
    createMagicParticles();
});

function updateTotalScore() {
    let totalStars = 0;
    for (let i = 1; i <= totalLevels; i++) {
        const savedStars = localStorage.getItem(`level${i}Stars`);
        if (savedStars) {
            let starValue = parseInt(savedStars);
            if (!isNaN(starValue)) {
                totalStars += starValue;
            }
        }
    }
    const display = document.getElementById('total-stars-display');
    if (display) {
        display.innerText = totalStars;
    }

    // Update total money
    const totalMoney = localStorage.getItem('totalMoney') || 0;
    const moneyDisplay = document.getElementById('total-money-display');
    if (moneyDisplay) {
        moneyDisplay.innerText = totalMoney;
    }
}
// تشغيل كل حاجة لما الصفحة تفتح
        window.onload = function() {
            initMap();
            updateTotalScore();
            createMagicParticles();
        };
          // فتح وقفل المودال
        function toggleSettings() {
            const modal = document.getElementById('settingsModal');
            modal.style.display = (modal.style.display === "flex") ? "none" : "flex";
        }

        // تحكم في الصوت
        function updateMusicVolume(val) {
            const music = document.getElementById('bgMusic');
            music.volume = val / 100;
            if(music.paused) music.play().catch(()=>{}); // شغل الميوزك أول ما يحرك السلايدر
        }

        function toggleStore() {
            const modal = document.getElementById('storeModal');
            modal.style.display = (modal.style.display === "flex") ? "none" : "flex";
            updateStoreUI();
        }

        function updateStoreUI() {
            const hints = localStorage.getItem('globalHints') || 3;
            document.getElementById('hint-stock').innerText = hints;
            
            const money = parseInt(localStorage.getItem('totalMoney')) || 0;
            updateTotalScore(); // Make sure money display is fresh
        }

        function buyItem(item, price) {
            let money = parseInt(localStorage.getItem('totalMoney')) || 0;
            if (money >= price) {
                money -= price;
                localStorage.setItem('totalMoney', money);
                
                if (item === 'hint') {
                    let hints = parseInt(localStorage.getItem('globalHints')) || 3;
                    hints++;
                    localStorage.setItem('globalHints', hints);
                    alert('Purchased! You now have ' + hints + ' hints.');
                } else if (item === 'unlock') {
                    unlockNextLevel();
                }
                
                updateTotalScore(); // Update top bar money display
                updateStoreUI();
            } else {
                alert('Not enough coins!');
            }
        }

        function unlockNextLevel() {
            for (let i = 1; i <= totalLevels; i++) {
                if (localStorage.getItem(`level${i}Completed`) !== 'true') {
                    localStorage.setItem(`level${i}Completed`, 'true');
                    alert('Level ' + i + ' Unlocked!');
                    initMap();
                    return;
                }
            }
            alert('All levels already unlocked!');
        }
    </script>
    <script src="js/preloader.js"></script>
</body>
</html>
