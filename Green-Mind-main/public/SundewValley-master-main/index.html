<body
    style="background: url('./images/background.png');background-size: cover; margin: 0; padding: 0; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding-top: 2vh; box-sizing: border-box;">
    <ul id="debugDashboard"
        style="display: none; position: fixed; top: 20px; right: 20px; background-color: rgba(0, 0, 0, 0.85); color: #00ff00; font-family: 'Courier New', Courier, monospace; list-style: none; padding: 15px; border-radius: 8px; width: 310px; max-height: 80vh; overflow-y: auto; z-index: 1000; font-size: 12px; border: 1px solid #00ff00; box-shadow: 0 0 15px rgba(0,255,0,0.3); pointer-events: auto;">
    </ul>
    <div id="pauseMenu"
        style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.7); backdrop-filter: blur(8px); z-index: 2000; align-items: center; justify-content: center; flex-direction: column; color: white; font-family: 'Verdana', sans-serif;">
        <div
            style="background: linear-gradient(135deg, rgba(30, 30, 30, 0.95), rgba(15, 15, 15, 0.95)); padding: 40px; border-radius: 15px; border: 2px solid rgba(255, 255, 255, 0.1); box-shadow: 0 15px 50px rgba(0, 0, 0, 0.5); display: flex; flex-direction: column; align-items: stretch; gap: 20px; min-width: 350px;">
            <div style="text-align: center;">
                <h1 style="margin: 0; font-size: 32px; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.5);">Game Paused
                </h1>
                <p style="margin: 5px 0 0 0; opacity: 0.8; font-size: 14px;">Press ESC to resume</p>
            </div>

            <div
                style="display: flex; flex-direction: column; gap: 12px; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 20px;">
                <button onclick="GAME_ENGINE.togglePause()"
                    style="width: 100%; padding: 12px; border-radius: 8px; border: none; background: #4CAF50; color: white; font-weight: bold; font-size: 16px; cursor: pointer;">Resume</button>
                <button onclick="SaveManager.save(); GAME_ENGINE.togglePause()"
                    style="width: 100%; padding: 12px; border-radius: 8px; border: none; background: #2196F3; color: white; font-weight: bold; font-size: 16px; cursor: pointer;">Save
                    Game</button>
                <button onclick="if(confirm('Are you sure you want to reset all progress?')) SaveManager.reset()"
                    style="width: 100%; padding: 12px; border-radius: 8px; border: none; background: #f44336; color: white; font-weight: bold; font-size: 16px; cursor: pointer;">Reset
                    Progress</button>
            </div>

            <div style="display: flex; flex-direction: column; gap: 15px;">
                <h3
                    style="margin: 0; font-size: 18px; color: #aaa; text-align: center; text-transform: uppercase; letter-spacing: 2px;">
                    Settings</h3>

                <label for="mute"
                    style="display: flex; align-items: center; justify-content: space-between; font-size: 16px; cursor: pointer; background: rgba(255,255,255,0.05); padding: 10px 15px; border-radius: 8px;">
                    <span>Mute Audio</span>
                    <input id="mute" type="checkbox" style="transform: scale(1.5); cursor: pointer;">
                </label>

                <label for="volume"
                    style="display: flex; align-items: center; justify-content: space-between; font-size: 16px; cursor: pointer; background: rgba(255,255,255,0.05); padding: 10px 15px; border-radius: 8px;">
                    <span>Volume</span>
                    <input id="volume" max="1" min="0" step="0.1" type="range" value="0.1"
                        style="width: 60%; cursor: pointer;">
                </label>
            </div>
        </div>
    </div>
    <div style="display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 1608px; padding: 5px 0; margin: 0 auto;">
        <div style="display: flex; justify-content: center; align-items: center; gap: 20px; width: 100%; margin-bottom: 8px;">
            <div style="color: white; font-family: 'Verdana', sans-serif; font-size: 16px; text-shadow: 0 2px 5px rgba(0,0,0,0.9), 0 0 10px rgba(0,0,0,0.5);">
                <strong>📖 Tutorial:</strong> <a href="./Game_Guide/index.html" rel="noopener noreferrer"
                    target="_self"
                    style="color: #66ff66; text-decoration: none; font-weight: bold; text-shadow: 0 2px 4px rgba(0,0,0,0.9);">Game
                    Guide</a>
            </div>

            <label for="debug"
                style="display: flex; align-items: center; gap: 10px; color: white; font-family: 'Verdana', sans-serif; text-shadow: 0 2px 5px rgba(0,0,0,0.9), 0 0 10px rgba(0,0,0,0.5); font-size: 16px; cursor: pointer;">
                <input id="debug" onclick="Debugger.switchDebugMode()" type="checkbox"
                    style="cursor: pointer; transform: scale(1.3);"> <strong>🐞 Debug Mode</strong>
            </label>

            <div style="display: flex; gap: 10px;">
                <button onclick="GAME_ENGINE.togglePause()"
                    style="padding: 10px 25px; cursor: pointer; background: #ff9800; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: transform 0.2s;">⚙️
                    Menu (Esc)</button>
                
                <button onclick="window.parent.postMessage('closeGame', '*')"
                    style="padding: 10px 25px; cursor: pointer; background: #3a7be7; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: transform 0.2s; display: flex; align-items: center; gap: 8px;">
                    <i class="fas fa-home"></i> Home
                </button>
            </div>
        </div>
        <canvas autofocus height="900" id="gameWorld" oncontextmenu="return false;"
            style="background: black; border: 4px solid #fff; box-shadow: 0 0 20px rgba(0,0,0,0.8); max-width: 100%; max-height: 85vh; border-radius: 4px;"
            tabindex="0" width="1600"></canvas>
    </div>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        window.addEventListener("keydown", function (e) {
            if (e.code === "Escape") {
                GAME_ENGINE.togglePause();
                e.preventDefault();
            }
        });
    </script>
</body>

</html>
